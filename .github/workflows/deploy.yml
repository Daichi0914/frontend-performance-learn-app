name: CD (Deploy to Home Server)

on:
  workflow_run:
    workflows: ["CI Workflow"]
    branches: ["main"]
    types: [completed]

  workflow_dispatch:
    inputs:
      target_env:
        description: 'デプロイ先の環境を選択してください'
        required: true
        type: choice
        options:
          - stg
          - prod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: ${{ inputs.target_env || 'stg' }}
    permissions:
      contents: read
      packages: write
    
    env:
      IMAGE_TAG: ${{ inputs.target_env || 'stg' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        run: echo "GHCR_REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend
        run: |
          docker buildx build \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }} \
            --target runner \
            --cache-from=type=gha,scope=frontend-release \
            --cache-to=type=gha,mode=max,scope=frontend-release \
            --push \
            -t ${{ env.REGISTRY }}/${{ env.GHCR_REPO }}/frontend:${{ env.IMAGE_TAG }} \
            ./frontend

      - name: Build and push Backend
        run: |
          docker buildx build \
            --cache-from=type=gha,scope=backend-release \
            --cache-to=type=gha,mode=max,scope=backend-release \
            --push \
            -t ${{ env.REGISTRY }}/${{ env.GHCR_REPO }}/backend:${{ env.IMAGE_TAG }} \
            ./backend

      - name: Build and push Nginx
        run: |
          docker buildx build \
            --push \
            -t ${{ env.REGISTRY }}/${{ env.GHCR_REPO }}/nginx:${{ env.IMAGE_TAG }} \
            ./nginx

      - name: Build and push MySQL
        run: |
          docker buildx build \
            --push \
            -t ${{ env.REGISTRY }}/${{ env.GHCR_REPO }}/mysql:${{ env.IMAGE_TAG }} \
            ./mysql

      - name: Upload compose.yaml for deploy job
        uses: actions/upload-artifact@v4
        with:
          name: compose-file
          path: compose.yaml

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    environment: ${{ inputs.target_env || 'stg' }}
    
    env:
      TARGET_ENV: ${{ inputs.target_env || 'stg' }}

    steps:
      - name: Setup environment variables
        run: |
          echo "GHCR_REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          echo "PROJECT_NAME=$(basename "${GITHUB_REPOSITORY,,}")" >> $GITHUB_ENV

      - name: Download compose.yaml
        uses: actions/download-artifact@v4
        with:
          name: compose-file
          path: ~/projects/${{ env.PROJECT_NAME }}

      - name: Create environment files
        run: |
          cd ~/projects/${{ env.PROJECT_NAME }}
          cat << EOF > .env.${{ env.TARGET_ENV }}
          APP_ENV=${{ env.TARGET_ENV }}
          NODE_ENV=production
          RESTART_POLICY=always
          GHCR_REPO=${{ env.GHCR_REPO }}
          MYSQL_VOLUME_NAME=${{ env.PROJECT_NAME }}-${{ env.TARGET_ENV }}_mysql_${{ env.TARGET_ENV }}_data
          REDIS_VOLUME_NAME=${{ env.PROJECT_NAME }}-${{ env.TARGET_ENV }}_redis_${{ env.TARGET_ENV }}_data
          NGINX_PORT=${{ vars.NGINX_PORT }}
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DSN=${{ secrets.MYSQL_DSN }}
          MYSQL_EXPOSE=${{ vars.MYSQL_EXPOSE }}
          REDIS_ADDR=redis:6379
          REDIS_EXPOSE=${{ vars.REDIS_EXPOSE }}
          AUTH_BASIC_STATE=${{ env.TARGET_ENV == 'stg' && 'Restricted' || 'off' }}
          CLOUDFLARE_TUNNEL_TOKEN=${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          EOF
          
          touch ./.htpasswd
          if [ "${{ env.TARGET_ENV }}" = "stg" ]; then
            podman run --rm docker.io/library/httpd:alpine htpasswd -bn ${{ secrets.BASIC_AUTH_USER }} ${{ secrets.BASIC_AUTH_PASS }} > ./.htpasswd
          fi

      - name: Ensure External Volumes Exist
        run: |
          podman volume create ${{ env.PROJECT_NAME }}-${{ env.TARGET_ENV }}_mysql_${{ env.TARGET_ENV }}_data || true
          podman volume create ${{ env.PROJECT_NAME }}-${{ env.TARGET_ENV }}_redis_${{ env.TARGET_ENV }}_data || true

      - name: Log in to GHCR via Podman
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Create and Enable Systemd Service
        run: |
          # systemdのユーザーサービス定義ディレクトリを作成
          mkdir -p ~/.config/systemd/user
          
          # サービス定義ファイルを生成（環境に合わせて動的に作成）
          cat << 'EOF' > ~/.config/systemd/user/${{ env.PROJECT_NAME }}-${{ env.TARGET_ENV }}.service
          [Unit]
          Description=Podman Compose ${{ env.PROJECT_NAME }} (${{ env.TARGET_ENV }})
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=%h/projects/${{ env.PROJECT_NAME }}
          ExecStart=/usr/bin/podman-compose --env-file .env.${{ env.TARGET_ENV }} -p ${{ env.PROJECT_NAME }}-${{ env.TARGET_ENV }} -f compose.yaml up
          ExecStop=/usr/bin/podman-compose --env-file .env.${{ env.TARGET_ENV }} -p ${{ env.PROJECT_NAME }}-${{ env.TARGET_ENV }} -f compose.yaml down
          Restart=always

          [Install]
          WantedBy=default.target
          EOF
          
          # サービスファイルをリロードし、自動起動を有効化
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          systemctl --user daemon-reload
          systemctl --user enable ${{ env.PROJECT_NAME }}-${{ env.TARGET_ENV }}.service

      - name: Deploy via Systemd
        run: |
          cd ~/projects/${{ env.PROJECT_NAME }}
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          
          # GHCRから最新イメージを明示的に取得
          podman-compose -p ${{ env.PROJECT_NAME }}-${{ env.TARGET_ENV }} --env-file .env.${{ env.TARGET_ENV }} pull
          
          systemctl --user daemon-reload
          systemctl --user restart ${{ env.PROJECT_NAME }}-${{ env.TARGET_ENV }}.service

      - name: Cleanup old images
        run: podman image prune -af --filter "until=24h"
        continue-on-error: true
