name: CI Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run Tests
        run: go test -v ./...

  test-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run Integration Tests
        run: go test -v -tags=integration ./...

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test

  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies."@playwright/test".version')" >> $GITHUB_OUTPUT
        working-directory: frontend

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend services with Docker Compose
        run: |
          cp .env.example .env
          GHCR_REPO=${GITHUB_REPOSITORY,,}
          REPO_NAME=$(basename "${GHCR_REPO}")
          echo "GHCR_REPO=${GHCR_REPO}" >> .env
          sed -i 's|APP_ENV=.*|APP_ENV=dev|' .env
          sed -i 's|ALLOWED_ORIGIN=.*|ALLOWED_ORIGIN=http://localhost:3001|' .env
          sed -i "s|MYSQL_VOLUME_NAME=.*|MYSQL_VOLUME_NAME=${REPO_NAME}_mysql_dev_data|" .env
          sed -i "s|REDIS_VOLUME_NAME=.*|REDIS_VOLUME_NAME=${REPO_NAME}_redis_dev_data|" .env
          sed -i 's|MYSQL_ROOT_PASSWORD=.*|MYSQL_ROOT_PASSWORD=ci_test_password|' .env
          sed -i 's|MYSQL_USER=.*|MYSQL_USER=app_user|' .env
          sed -i 's|MYSQL_PASSWORD=.*|MYSQL_PASSWORD=ci_test_password|' .env
          sed -i 's|MYSQL_DSN=.*|MYSQL_DSN=app_user:ci_test_password@tcp(mysql:3306)/appdb?parseTime=true\&loc=Asia%2FTokyo|' .env
          sed -i 's|NEXT_PUBLIC_API_URL=.*|NEXT_PUBLIC_API_URL=http://localhost:8080/api|' .env
          
          docker build --target dev \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:8080/api \
            -t ghcr.io/${GHCR_REPO}/frontend:dev ./frontend &
          
          docker build -t ghcr.io/${GHCR_REPO}/backend:dev ./backend &
          docker build -t ghcr.io/${GHCR_REPO}/nginx:dev ./nginx &
          docker build -t ghcr.io/${GHCR_REPO}/mysql:dev ./mysql &
          
          wait
          
          touch ./.htpasswd
          docker volume create ${REPO_NAME}_mysql_dev_data || true
          docker volume create ${REPO_NAME}_redis_dev_data || true
          docker compose -f compose.yaml up -d --wait --scale cloudflared=0

      - name: Run E2E Tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
